name: CI — Testes Automatizados

# Quando este pipeline roda:
# - Em qualquer push para main ou develop
# - Em qualquer Pull Request aberto contra main
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # JOB 1: Testes do Backend (Jest + Supertest)
  # ─────────────────────────────────────────────
  testes-backend:
    name: Testes do Backend
    runs-on: ubuntu-latest

    # Sobe um PostgreSQL real para os testes de integração
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: produtos_db_test
        ports:
          - 5432:5432
        # Aguarda o banco estar pronto antes de rodar os testes
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: 📦 Instalar dependências do backend
        working-directory: backend
        run: npm ci

      - name: 🧪 Rodar testes do backend
        working-directory: backend
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_NAME: produtos_db_test
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 2: Testes do Frontend (Vitest)
  # ─────────────────────────────────────────────
  testes-frontend:
    name: Testes do Frontend
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: 📦 Instalar dependências do frontend
        working-directory: frontend
        run: npm ci

      - name: 🧪 Rodar testes do frontend
        working-directory: frontend
        run: npm test

  # ─────────────────────────────────────────────
  # JOB 3: Build das imagens Docker
  # Só roda se os dois jobs de teste passarem
  # ─────────────────────────────────────────────
  build:
    name: Build Docker
    runs-on: ubuntu-latest
    needs: [testes-backend, testes-frontend]

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🐳 Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔨 Build da imagem do backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: false       # só verifica se o build funciona, sem publicar
          tags: produtos-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🔨 Build da imagem do frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: produtos-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max