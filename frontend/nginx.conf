server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Redireciona todas as rotas para o index.html (necessário para SPAs)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy reverso para a API — o frontend chama /api e o Nginx
    # encaminha para o backend, evitando problemas de CORS em produção
    location /api/ {
        proxy_pass http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Cache para arquivos estáticos gerados pelo Vite (hash no nome)
    location ~* \.(js|css|png|jpg|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
