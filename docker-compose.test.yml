services:

  # Banco de dados exclusivo para testes (dados isolados)
  db_test:
    image: postgres:16-alpine
    container_name: produtos_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: produtos_db_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d produtos_db_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend rodando os testes Jest + Supertest
  backend_test:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: produtos_backend_test
    command: npm test
    environment:
      DB_HOST: db_test
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: produtos_db_test
    depends_on:
      db_test:
        condition: service_healthy

  # Frontend rodando os testes Vitest
  frontend_test:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: build   # Para apenas no estágio de build (onde as deps de dev estão)
    container_name: produtos_frontend_test
    command: npm test
